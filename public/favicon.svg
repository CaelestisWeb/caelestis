<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">

  <!-- Fond brun foncé arrondi -->
  <rect width="32" height="32" rx="6" fill="#2A1E0C"/>

  <!--
    Cercle presque complet, centre (16,13), r=9
    Gap à ~4h30 (entre 30° et 60° depuis 3h, sens horaire SVG)
    Point départ arc (60°) : (16+9cos60°, 13+9sin60°) = (20.5, 20.79)
    Point fin arc  (30°) : (16+9cos30°, 13+9sin30°) = (23.79, 17.5)
    Arc long sens horaire (large-arc=1, sweep=1)
  -->
  <path
    d="M 20.5 20.79 A 9 9 0 1 1 23.79 17.5"
    fill="none"
    stroke="#EDE3D4"
    stroke-width="1.1"
    stroke-linecap="round"
  />

  <!-- Point vert au gap (45° : (22.36, 19.36)) -->
  <circle cx="22.36" cy="19.36" r="1.85" fill="#889063"/>

  <!-- Tige principale courbée montant du bas-gauche vers le haut -->
  <path
    d="M 13.5 18 Q 15 13.5 17.5 8"
    fill="none"
    stroke="#EDE3D4"
    stroke-width="0.95"
    stroke-linecap="round"
  />

  <!-- Feuille gauche basse -->
  <path
    d="M 14 17 C 10.5 15 10 11 12.5 10 C 13.5 11.5 14.5 15 14 17 Z"
    fill="#EDE3D4"
    opacity="0.88"
  />

  <!-- Feuille droite haute -->
  <path
    d="M 16 13 C 19 10.5 21.5 10.5 20.5 7.5 C 18.5 8.5 15.5 10.5 16 13 Z"
    fill="#EDE3D4"
    opacity="0.88"
  />

  <!-- Petit bourgeon terminal -->
  <path
    d="M 17 9.5 C 15.5 7.5 15.5 5.5 17.5 5 C 18 6.5 18 8.5 17 9.5 Z"
    fill="#EDE3D4"
    opacity="0.75"
  />

</svg>
